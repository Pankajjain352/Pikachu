<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – SRMS</title>
  <meta name="description" content="Student Result Management System – Admin Login Portal" />

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ==================== LOGIN PAGE ==================== -->
  <div class="login-page">
    <div class="login-container">
      <div class="login-card">

        <!-- Logo / Branding -->
        <div class="logo">
          <div class="logo-icon">
            <i class="fas fa-graduation-cap"></i>
          </div>
          <h1>SRMS</h1>
          <p>Student Result Management System</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" autocomplete="off">
          <!-- Username field -->
          <div class="form-group" id="userGroup">
            <label for="username">Username</label>
            <div class="input-wrapper">
              <input
                type="text"
                id="username"
                placeholder="Enter your username"
                autofocus
              />
              <i class="fas fa-user"></i>
            </div>
            <div class="error-msg" id="userError">Please enter a username</div>
          </div>

          <!-- Password field -->
          <div class="form-group" id="passGroup">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <input
                type="password"
                id="password"
                placeholder="Enter your password"
              />
              <i class="fas fa-lock"></i>
            </div>
            <div class="error-msg" id="passError">Please enter a password</div>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn btn-primary" id="loginBtn">
            <i class="fas fa-right-to-bracket"></i>
            Sign In
          </button>
        </form>

        <!-- Hint Box -->
        <div class="login-hint">
          <p><i class="fas fa-circle-info"></i> Demo credentials</p>
          <p>Username: <span>admin</span> &nbsp;|&nbsp; Password: <span>admin123</span></p>
        </div>

      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="script.js"></script>
  <script>
    // ---- Login Form Handler ----
    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', function (e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const userGroup = document.getElementById('userGroup');
      const passGroup = document.getElementById('passGroup');

      // Reset errors
      userGroup.classList.remove('error');
      passGroup.classList.remove('error');

      let valid = true;

      // Validate username
      if (!username) {
        userGroup.classList.add('error');
        valid = false;
      }

      // Validate password
      if (!password) {
        passGroup.classList.add('error');
        valid = false;
      }

      if (!valid) return;

      // Check dummy credentials
      if (username === 'admin' && password === 'admin123') {
        // Store login state
        sessionStorage.setItem('srms_logged_in', 'true');
        sessionStorage.setItem('srms_admin', username);

        showToast('Login successful! Redirecting...', 'success');

        // Redirect after short delay
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 800);
      } else {
        showToast('Invalid username or password!', 'error');
      }
    });

    // Remove error on input
    document.getElementById('username').addEventListener('input', () => {
      document.getElementById('userGroup').classList.remove('error');
    });
    document.getElementById('password').addEventListener('input', () => {
      document.getElementById('passGroup').classList.remove('error');
    });
  </script>

</body>
</html>
